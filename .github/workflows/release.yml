name: release
on:
  push:
    branches:
      - main
  pull_request_target:
  workflow_dispatch:


permissions:
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  release:
    if: "!startsWith(github.head_ref, 'release-please')"
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.release-please.outputs['lumio_core--release_created'] }}
      help: ${{ steps.release-please.outputs['lumio_help--release_created'] }}
      lumio: ${{ steps.release-please.outputs['lumio--release_created'] }}
      node: ${{ steps.release-please.outputs['lumio_node--release_created'] }}
      node_tag_name: ${{ steps.release-please.outputs['lumio_node--tag_name'] }}
    steps:
      - name: 获取token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: 运行 release-please-action
        id: release-please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json


  publish-lib:
    runs-on: ubuntu-latest
    needs: [ release ]
    if: needs.release.outputs.core == 'true' || needs.release.outputs.help == 'true' || needs.release.outputs.lumio == 'true'
    steps:
      - name: 检出代码
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - name: 设置 Rust 工具链
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: 设置 Rust 缓存
        uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: 发布 lumio_core
        if: needs.release.outputs.core == 'true'
        run: cargo publish --package lumio_core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_API_TOKEN }}

      - name: 发布 lumio_help
        if: needs.release.outputs.help == 'true'
        run: cargo publish --package lumio_help
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_API_TOKEN }}

      - name: 发布 lumio
        if: needs.release.outputs.lumio == 'true'
        run: cargo publish --package lumio
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_API_TOKEN }}


  build:
    needs: release
    if: needs.release.outputs.node == 'true'
    uses: ./.github/workflows/build.yml

  publish-npm:
    runs-on: ubuntu-latest
    needs: [ release, build ]
    steps:
      - name: 获取token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: 下载 npm 包
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-package
          path: lumio_node

      - name: 下载构建产物
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: lumio-node*
          path: lumio_node/artifacts

      - name: 配置 Nodejs
        uses: puniyu/setup-node@af0f53e773ab16523ac167460cb4e95daae92550 # main
        with:
          node-version: lts/*
          pnpm-version: latest

      - name: 发布 npm 包
        run: |
          pnpm i -g @napi-rs/cli
          pnpm config set provenance true
          pnpm config set registry https://registry.npmjs.org/
          pnpm run create-npm-dirs
          pnpm run artifacts
          pnpm publish --access public
        working-directory: lumio_node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 上传 Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          files: |
            lumio_node/artifacts/lumio-node-*/*.node
          tag_name: ${{ needs.release.outputs.node_tag_name }}

